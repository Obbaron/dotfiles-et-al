[mgr]
show_hidden = true
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_symlink = true
scrolloff = 5
mouse_events = true
ratio = [1, 4, 3]

[preview]
tab_size = 4
max_width = 1200
max_height = 1600

[opener]
edit = [
    { run = 'nvim "$@"', block = true },
]

play = [
    { run = 'mpv "$@"', orphan = true },
]

open = [
    { run = 'xdg-open "$@"', orphan = true },
]

extract = [
    { run = 'ouch decompress "$@"', block = true },
]

[open]
prepend_rules = [
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
]
