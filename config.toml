# ═══════════════════════════════════════════════════════════════════════════
#  Pipeline steps:
#  packages → directories → git → files → fonts → links → services → commands
#
# ── Composition model ──────────────────────────────────────────────────────
#  A CONCEPT is a name (e.g. `firewall`) that may own a module under several
#  steps. `*.firewall` pulls every one of them: the package, the service, and
#  the command. Name a concept once; use it everywhere.
#
#  A LEAF declares what it needs via `requires` — it never assumes a directory
#  or repo exists. Leaves are therefore safe to pull in from anywhere.
#
#  An AGGREGATOR is a module with `requires` and NO `items`; it exists only to
#  compose other modules. By convention they live under [packages.*] (a module
#  must live under some step; packages is the arbitrary but consistent home).
#
#  A PROFILE is then a short list of aggregators.
#
# ── Naming rule ────────────────────────────────────────────────────────────
#  `*.name` sweeps EVERY step that defines `name`. So a concept name means one
#  thing across the whole file. Don't reuse a name for an unrelated module or
#  it will get swept in.
# ═══════════════════════════════════════════════════════════════════════════


# ── profiles ───────────────────────────────────────────────────────────────
# Thin: each is a handful of aggregators. Add capability by adding a concept,
# not by editing every profile.

[profiles]
minimal = ["*.core"]
server  = ["*.server"]
desktop = ["*.desktop"]


# ═══════════════════════════════════════════════════════════════════════════
#  AGGREGATORS — requires-only; no items. The composition layer.
# ═══════════════════════════════════════════════════════════════════════════

# The floor every machine gets: base dirs, core CLI, ssh file, gbin, shell rc.
[packages.core]
requires = ["*.base", "*.cli", "*.shell", "*.gbin"]

# Bundles the three language toolchains. Add a language by adding its concept
# here once; every profile using *.langs picks it up.
[packages.langs]
requires = ["*.python", "*.rust", "*.go"]

# Headless box: core + networking + firewall + archive tools.
[packages.server]
requires = ["*.core", "*.net", "*.utils", "*.firewall"]

# Workstation: core + terminal tooling + languages + dev tools + repos + fonts.
[packages.desktop]
requires = [
  "*.core",
  "*.terminal",
  "*.langs",
  "*.devtools",
  "*.projects",
  "*.jetbrains",
]


# ═══════════════════════════════════════════════════════════════════════════
#  FOUNDATIONS — directories other concepts require. No profile lists these
#  directly; the leaves that need them pull them in.
# ═══════════════════════════════════════════════════════════════════════════

# Everything assumes these exist.
[directories.base]
items = [
  "~/.bashrc.d",
  "~/.local/bin",
  "~/.config",
  { path = "~/.ssh", mode = "700" }
]

[directories.xdg_base]
items = [
  "~/.local/share",
  "~/.local/state",
  "~/.cache"
]

[directories.xdg_user]
items = [
  { path = "~/Audio", label = "Music" },
  "~/Desktop",
  "~/Documents",
  "~/Downloads",
  "~/Projects",
  "~/Templates",
  "~/Public",
  { path = "~/Images", label = "Pictures" },
  "~/Videos"
]

# Where desktop-ish assets land (fonts, .desktop files, icons).
[directories.assets]
items = [
  "~/.local/share/fonts",
  "~/.local/share/applications",
  "~/.local/share/icons",
  "~/.config/system/user"
]


# ═══════════════════════════════════════════════════════════════════════════
#  CONCEPTS — each is a vertical slice. `*.name` pulls the whole thing.
# ═══════════════════════════════════════════════════════════════════════════

# ── base ───────────────────────────────────────────────────────────────────
# The XDG floor. An aggregator over the directory foundations.
[packages.base]
requires = ["directories.base", "directories.xdg_base"]

# ── cli: the core command-line tools + the ssh file they imply ──────────────
[packages.cli]
items = [
  "fzf",
  "nvim",
  { name = "ripgrep", alias = "rg" },
  "which",
  "vim",
  "tree"
]

[files.cli]
requires = ["directories.base"]   # ~/.ssh (mode 700) must exist
items = [
  { path = "~/.ssh/authorized_keys", mode = "600" }
]

# ── shell: bash + vim rc files ─────────────────────────────────────────────
[packages.shell]
requires = ["links.bash", "links.vim"]

[links.bash]
requires = ["directories.base"]   # ~/.bashrc.d must exist
items = [
  { src = "$REPO_HOME/bash/.bashrc", dest = "~/.bashrc" },
  { src = "$REPO_HOME/bash/.bash_profile", dest = "~/.bash_profile" },
  { src = "$REPO_HOME/bash/.bashrc.d/aliases.sh", dest = "~/.bashrc.d/aliases.sh" },
  { src = "$REPO_HOME/bash/.bashrc.d/functions.sh", dest = "~/.bashrc.d/functions.sh" }
]

[links.vim]
items = [
  { src = "$REPO_HOME/vim/.vimrc", dest = "~/.vimrc" }
]

# ── gbin: personal scripts repo, cloned to ~ ───────────────────────────────
[git.gbin]
items = [
  { url = "https://github.com/Obbaron/.gbin.git", target = "~" }
]

# ── terminal: the nicer interactive stack ──────────────────────────────────
[packages.terminal]
items = [
  "bat",
  "jq",
  "tmux",
  "yazi",
  "fastfetch",
  "fd-find",
  "eza",
  "zoxide",
  "starship",
  "btop"
]

# ── utils: archives and compression ────────────────────────────────────────
[packages.utils]
items = [
  { name = "p7zip", alias = "7z" },   # canonical ≠ command
  "tar",
  "xz",
  "unzip",
  "zip"
]

# ── net ────────────────────────────────────────────────────────────────────
[packages.net]
items = [
  "wget",
  "curl",
  "nmap"
]

# ── firewall: the model slice — package + service + command ────────────────
[packages.firewall]
items = [
  "ufw"
]

[services.firewall]
requires = ["packages.firewall"]
items = [
  { name = "ufw", enabled = true, started = true }
]

[commands.firewall]
requires = ["services.firewall"]
items = [
  { run = "ufw default deny incoming", desc = "Default-deny inbound", sudo = true, unless = "ufw status verbose | grep -q 'deny (incoming)'" }
]

# ── languages ──────────────────────────────────────────────────────────────
# Each is a slice, so a language can grow files/links/commands later without
# touching any profile.

[packages.python]
items = [
  "python3",
  "uv"
]

[packages.rust]
items = [
  "rustc"
]

[packages.go]
items = [
  "golang"
]

# ── devtools: build/task tooling ───────────────────────────────────────────
[packages.devtools]
items = [
  "direnv",
  "just",
  "make"
]

# ── projects: repos that live in ~/Projects ────────────────────────────────
[git.projects]
requires = ["directories.xdg_user"]   # ~/Projects must exist
items = [
  { url = "https://github.com/Obbaron/ohpal.git", target = "~/Projects" },
  { url = "https://github.com/Obbaron/ttrpy.git", target = "~/Projects" }
]

# ── jetbrains: the font ────────────────────────────────────────────────────
[fonts.jetbrains]
requires = ["directories.assets"]
items = [
  "JetBrainsMono"
]

# ── optional concepts (defined, not in any profile — add via requires) ──────

[packages.docker]
items = [
  "docker"
]

[packages.wol]
items = [
  "wakeonlan"
]
